[package]
name = "aski-rs"
version = "0.1.0"
edition = "2021"
description = "aski Rust backend — Kernel Aski parser, codegen, rustc integration"

[dependencies]
logos = "0.14"
miette = { version = "7", features = ["fancy"] }
ariadne = "0.4"
serde_json = "1"
rkyv = { version = "0.8", features = ["bytecheck"] }
rayon = "=1.10.0"
ascent = "0.8.0"
aski-core = { path = "../aski-core" }

[dev-dependencies]
